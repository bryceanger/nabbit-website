<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Log in to your Nabbit account."/>
  <meta name="robots" content="noindex, nofollow"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="X-Frame-Options" content="DENY"/>
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
  <title>Log in — Nabbit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:    #00A854;
      --green-dk: #007A3D;
      --green-lt: #E8F5EE;
      --cyan:     #0099CC;
      --slate:    #0F1A12;
      --slate-lt: #5A7060;
      --white:    #F4F8F5;
      --border:   #D6E8DB;
      --font:     'Plus Jakarta Sans', sans-serif;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--slate);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,168,84,0.10), 0 2px 8px rgba(15,26,18,0.06);
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: -.02em;
      color: var(--slate);
      margin-bottom: 2rem;
      text-decoration: none;
    }
    .logo img {
      height: 38px;
      width: auto;
      object-fit: contain;
      border-radius: 8px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--slate);
      margin-bottom: .5rem;
    }
    p {
      font-size: .9rem;
      color: var(--slate-lt);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--green);
      color: #fff;
      font-family: var(--font);
      font-weight: 700;
      font-size: 1rem;
      padding: .9rem 1.5rem;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 2px 12px rgba(0,168,84,.3);
      margin-bottom: .75rem;
    }
    .btn-primary:hover {
      background: var(--green-dk);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,168,84,.4);
    }

    .btn-outline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: transparent;
      color: var(--slate);
      font-family: var(--font);
      font-weight: 600;
      font-size: .95rem;
      padding: .85rem 1.5rem;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      text-decoration: none;
      transition: border-color .2s, color .2s;
    }
    .btn-outline:hover {
      border-color: var(--green);
      color: var(--green);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin: 1.25rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: .75rem;
      color: var(--slate-lt);
    }

    .secure {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: .72rem;
      color: var(--slate-lt);
      margin-top: 1.5rem;
    }
    .secure svg { width: 12px; height: 12px; fill: #059669; }

    .back {
      margin-top: 1.5rem;
      font-size: .82rem;
      color: var(--slate-lt);
    }
    .back a {
      color: var(--green);
      font-weight: 600;
      text-decoration: none;
    }
    .back a:hover { text-decoration: underline; }

    /* Spinner animation while redirecting */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; border-radius: 16px; }
    }
  </style>
</head>
<body>

<div class="card">
  <a href="/" class="logo">
    <img src="logo.jpg" alt="Nabbit"/>
    nabbit
  </a>

  <h1>Welcome back 👋</h1>
  <p>Nabbit accounts are managed through our secure app. Click below and you'll be logged in right away.</p>

  <a href="https://ledger-live-close.lovable.app" class="btn-primary" id="loginBtn" onclick="startRedirect(event, 'https://ledger-live-close.lovable.app')">
    <span id="btnText">Log in to Nabbit →</span>
    <span class="spinner" id="spinner"></span>
  </a>

  <div class="divider"><span>new to Nabbit?</span></div>

  <a href="https://ledger-live-close.lovable.app" class="btn-outline" onclick="startRedirect(event, 'https://ledger-live-close.lovable.app')">
    Start your free 30-day trial
  </a>

  <div class="secure">
    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
    Secured with 256-bit SSL · Canadian data · CRA-compliant
  </div>

  <div class="back">← <a href="/">Back to nabbit.ca</a></div>
</div>

<script>
  function startRedirect(e, url) {
    e.preventDefault();
    document.getElementById('btnText').textContent = 'Redirecting…';
    document.getElementById('spinner').style.display = 'inline-block';
    setTimeout(() => { window.location.href = url; }, 400);
  }
</script>

</body>
</html>
